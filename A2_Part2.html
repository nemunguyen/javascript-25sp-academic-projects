<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factorial and Grade System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #b01b27 0%, #b41220 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            color: #f4f4f4;
        }

        .container {
            background-color: #ffffff; 
            padding: 0;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 850px;
            overflow: hidden; 
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .apu-hero-image {
            width: 100%;
            height: 220px;
            background-image:  url('Medium-2022 APU Towers.jpeg');
            background-size: cover;
            background-position: center;
        }

        .content-body {
            padding: 35px 40px 40px 40px;
        }

        .header-section {
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            padding-bottom: 20px;
        }

        h2 {
            font-size: 1.6rem;
            color: #000000;
            font-weight: 700;
            margin-bottom: 4px;
        }

        h3 {
            font-size: 1.1rem;
            color: #000000;
            font-weight: 500;
            margin-bottom: 6px;
        }

        h4 {
            font-size: 0.95rem;
            color: #d4af37; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            align-items: flex-end;
            margin-bottom: 35px;
        }

        .input-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #000000;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background-color: #ffffff;
            border: 1.5px solid #000000;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #000000;
            font-family: inherit;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: #9c1c21; 
            box-shadow: 0 0 0 3px rgba(156, 28, 33, 0.3);
            background-color: #fbfbfb;
        }


        button {
            background-color: #7a1216; 
            color: #ffffff;
            border: 1px solid #9c1c21;
            padding: 13px 24px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            box-shadow: 0 4px 12px rgba(122, 18, 22, 0.3);
        }

        button:hover {
            background-color: #9c1c21;
            box-shadow: 0 4px 16px rgba(156, 28, 33, 0.5);
        }

        button:active {
            transform: scale(0.98);
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            text-align: left;
        }

        th {
            background-color: #ffffff;
            color: #000000; 
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 14px 16px;
            border-bottom: 2px solid #000000;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid #291f21;
            font-size: 0.95rem;
            color: #000000;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .grade-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.85rem;
        }
        .grade-pass { background-color: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .grade-fail { background-color: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body>

    <div class="container">
        <div class="apu-hero-image"></div>

        <div class="content-body">
            <div class="header-section">
                <h2>Nguyen Van Phuong Nam - 11423083</h2>
                <h3>Assignment 2 - Part 02</h3>
                <h4>APU Grade System</h4>
            </div>
            
            <div class="form-group">
                <div class="input-field">
                    <label for="studentId">Student ID</label>
                    <input type="text" id="studentId" placeholder="e.g. 11423083">
                </div>
                <div class="input-field">
                    <label for="studentName">Student Name</label>
                    <input type="text" id="studentName" placeholder="e.g. Jane Doe">
                </div>
                <div class="input-field">
                    <label for="marks">Marks</label>
                    <input type="number" id="marks" min="0" max="100" placeholder="0-100">
                </div>
                <button onclick="addStudent()">Get the Grade</button>
            </div>
            
            <div class="table-container">
                <table id="gradesTable">
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Student Name</th>
                            <th>Marks</th>
                            <th>Grade</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function addStudent() {
            const studentId = document.getElementById('studentId').value.trim();
            const studentName = document.getElementById('studentName').value.trim();
            const marks = parseInt(document.getElementById('marks').value);
            const tableBody = document.querySelector('#gradesTable tbody');

            if (!studentId || !studentName || isNaN(marks) || marks < 0 || marks > 100) {
                alert("Please enter valid Student ID, Name, and Marks (0-100)");
                return;
            }
            
            const grade = getGrade(marks);
            const row = tableBody.insertRow();
            
            const badgeClass = grade === 'F' ? 'grade-badge grade-fail' : 'grade-badge grade-pass';

            row.insertCell(0).textContent = studentId;
            row.insertCell(1).textContent = studentName;
            row.insertCell(2).textContent = marks;
            row.insertCell(3).innerHTML = `<span class="${badgeClass}">${grade}</span>`;

            document.getElementById('studentId').value = '';
            document.getElementById('studentName').value = '';
            document.getElementById('marks').value = '';
        }

        function getGrade(marks) {
            if (marks >= 90) return 'A+';
            if (marks >= 80) return 'A';
            if (marks >= 70) return 'B';
            if (marks >= 60) return 'C';
            return 'F';
        }
    </script>
</body>
</html>
